name: Cairn
options:
  bundleIdPrefix: com.ongjin
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ARCHS: "$(ARCHS_STANDARD)"
    SWIFT_OBJC_BRIDGING_HEADER: Sources/BridgingHeader.h
    LIBRARY_SEARCH_PATHS:
      - $(SRCROOT)/../target/universal/release
    OTHER_LDFLAGS:
      - -lcairn_ffi
      - -lz
      - -liconv
    CLANG_CXX_LIBRARY: "libc++"

targets:
  Cairn:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "Cairn.entitlements"
      - path: Resources
        buildPhase: resources
    info:
      path: Sources/Info.plist
      properties:
        LSApplicationCategoryType: public.app-category.utilities
        NSHumanReadableCopyright: "Copyright © 2026 ongjin. MIT License."
        CFBundleIconName: AppIcon
        NSDesktopFolderUsageDescription: "Cairn needs access to your Desktop to display and manage its files as a Finder replacement."
        NSDocumentsFolderUsageDescription: "Cairn needs access to your Documents to display and manage its files as a Finder replacement."
        NSDownloadsFolderUsageDescription: "Cairn needs access to your Downloads to display and manage its files as a Finder replacement."
        NSAppleMusicUsageDescription: "Cairn lists files inside your Music folder as part of browsing your home directory. It does not play, modify, or upload any media."
        NSPhotosUsageDescription: "Cairn lists files inside your Pictures folder as part of browsing your home directory. It does not read photo contents or metadata."
        NSRemovableVolumesUsageDescription: "Cairn lists and opens files on removable volumes as a Finder replacement."
        NSNetworkVolumesUsageDescription: "Cairn lists and opens files on network volumes as a Finder replacement."
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: Sources/Cairn.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
  CairnTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: CairnTests
    dependencies:
      - target: Cairn
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Cairn.app/Contents/MacOS/Cairn"
        GENERATE_INFOPLIST_FILE: YES
